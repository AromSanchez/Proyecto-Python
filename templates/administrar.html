<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrar Registros</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <h1>Administrar Registros</h1>

        <a href="/" class="administrar-link">Volver a Registro</a>
        <div class="separator"></div>

        <table>
            <thead>
                <tr>
                    <th>DNI</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Dirección</th>
                    <th>Teléfono</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for persona in registros %}
                <tr>
                    <td>{{ persona[1] }}</td> <!-- dni -->
                    <td>{{ persona[2] }}</td> <!-- nombre -->
                    <td>{{ persona[3] }}</td> <!-- apellido -->
                    <td>{{ persona[4] }}</td> <!-- direccion -->
                    <td>{{ persona[5] }}</td> <!-- telefono -->
                    <td>
                        <form action="/eliminar/{{ persona[1] }}" method="post" onsubmit="return confirm('¿Seguro que deseas eliminar este registro?');">
                            <button type="submit" style="background-color:#dc3545; color:#fff; border:none; padding:5px 10px; border-radius:3px;">Eliminar</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
